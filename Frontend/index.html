<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>SmartScheduler</title>
    <link rel="stylesheet" href="assets/css/menu.css" />
    <!-- MENU THƯ VIỆN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>


  
  <body>
    <div id="menu"></div>   
    
    <div class="toolbar">
      <button title="Mở file"><i class="fa-regular fa-folder-open"></i></button>
      <button title="Lưu file">
        <i class="fa-regular fa-floppy-disk"></i>
      </button>

      <span class="sep"></span>

      <button title="Xếp TKB"><i class="fa-solid fa-bolt"></i></button>
      <button title="Tối ưu TKB">
        <i class="fa-solid fa-bolt-lightning"></i>
      </button>

      <span class="sep"></span>

      <button title="Lịch"><i class="fa-regular fa-calendar-days"></i></button>
      <button title="Xóa"><i class="fa-solid fa-xmark"></i></button>
      <button title="Cố định"><i class="fa-solid fa-thumbtack"></i></button>

      <span class="sep"></span>

      <button title="AI"><i class="fa-solid fa-robot"></i></button>
      <button title="Trợ giúp">
        <i class="fa-regular fa-circle-question"></i>
      </button>
    </div>
    

    
  <script src="assets/js/menu.js"></script>
  
  </body>
</html>
