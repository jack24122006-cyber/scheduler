<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh sách nhóm lớp học</title>

<!-- CSS MENU -->
<link rel="stylesheet" href="../../../assets/css/menu.css">

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">





<style>

/* ===== TOOLBAR ===== */

.toolbar{
  display:flex;
  gap:8px;
  padding:6px 10px;
  background:#f5f5f5;
  border-bottom:1px solid #ccc;
}

.tool-btn{
  width:28px;
  height:28px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

.tool-btn:hover{
  background:#e8f0fe;
}


/* ===== POPUP ===== */

.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.2);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-box{
  width:420px;
  background:white;
  border:1px solid #ccc;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.popup-header{
  background:#f3f3f3;
  padding:8px 10px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.popup-body{
  padding:15px;
}

.form-row{
  margin-bottom:10px;
}

.form-row label{
  display:inline-block;
  width:80px;
}

.form-row input{
  width:260px;
  padding:4px;
}

.popup-footer{
  padding:10px;
  text-align:right;
}

.popup-footer button{
  padding:5px 10px;
}

</style>

</head>

<body>

<!-- MENU CHUNG -->
<div id="menu"></div>


<!-- ===== TOOLBAR ===== -->

<div class="toolbar">

<button class="tool-btn">
<i class="fa-solid fa-xmark"></i>
</button>

<button class="tool-btn" onclick="openForm()">
<i class="fa-solid fa-plus"></i>
</button>

<button class="tool-btn">
<i class="fa-solid fa-pen"></i>
</button>

<button class="tool-btn">
<i class="fa-solid fa-trash"></i>
</button>

<button class="tool-btn">
<i class="fa-solid fa-arrow-up"></i>
</button>

<button class="tool-btn">
<i class="fa-solid fa-arrow-down"></i>
</button>

</div>


<!-- ===== POPUP ===== -->

<div id="popupForm" class="popup-overlay">

<div class="popup-box">

<div class="popup-header">
Nhóm lớp học
<span onclick="closeForm()">✖</span>
</div>

<div class="popup-body">

<div class="form-row">
<label>Tên nhóm</label>
<input type="text">
</div>

<div class="form-row">
<label>Mã nhóm</label>
<input type="text">
</div>

<div class="form-row">
<label>Ghi chú</label>
<input type="text">
</div>

</div>

<div class="popup-footer">
<button>Chấp nhận</button>
<button onclick="closeForm()">Hủy bỏ</button>
</div>

</div>
</div>


<script>

    function openForm(){
  document.getElementById("popupForm").style.display="flex";
}

function closeForm(){
  document.getElementById("popupForm").style.display="none";
}

</script>





<!-- JS MENU -->
<script src="../../../assets/js/menu.js"></script>

</body>
</html>
